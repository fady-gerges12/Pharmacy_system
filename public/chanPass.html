    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .box-body .btn{
            width: 200px;
        }
    </style>

</head>
<body>

    <div>
        <!-- Example Code Start-->
        <nav class="navbar navbar-expand-lg bg-body-tertiary sticky-top">
            <div class="container-fluid">
                <a class="navbar-brand m-2 fw-bold" href="#">Dr.Maher Pharmacy</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">

                        <a class="nav-link active text-white" aria-current="page" href="home.html">Home</a>
                        <a class="nav-link text-white" href="clients.html">Clients</a>
                        <a class="nav-link text-white" href="chanPass.html">Change Password</a>
                        <a class="nav-link text-danger btn" onclick="logout()" >Logout</a>
                    </div>
                </div>
            </div>
        </nav>
        <!-- Example Code End -->

        <div class="container-fluid p-4 password-card">

            <div class="header bg-dark text-white text-center p-3 mt-2 mb-3">
                <h4> Change Password </h4>
            </div>

            <div class="box-body p-5">

                <div class="mb-4 position-relative">
                    <input type="password" id="oldPass" class="form-control" placeholder="Old Password">
                    <span onclick="togglePasswordOld()" style="position:absolute; right:10px; top:8px; cursor:pointer;">
                        👁
                    </span>

                </div>

                <div class="mb-4 position-relative">
                    <input type="password" id="newPass" class="form-control" placeholder="New password">
                    <span onclick="togglePasswordNew()" style="position:absolute; right:10px; top:8px; cursor:pointer;">
                        👁
                    </span>

                </div>

                <div class="mb-4 position-relative">
                    <input type="password" id="confirmPass" class="form-control" placeholder="Confirm Password">
                    <span onclick="togglePasswordConfirm()"
                        style="position:absolute; right:10px; top:8px; cursor:pointer;">
                        👁
                    </span>

                </div>

                <button class="btn btn-dark " onclick="changePassword()">
                    Save Password
                </button>

                <p id="msg" class=""></p>

            </div>

        </div>
    </div>

                    </ul>
                </div>

                <div class="col-md-4">
                    <h5 class="mb-3">Contact</h5>
                    <p class="small mb-1">📧 email@fadyjrjs891.com</p>
                    <p class="small mb-1">📞 01221638196</p>
                </div>

            </div>
        </div>

        <div class="text-center py-2 border-top border-secondary">
            <small>© 2026 جميع الحقوق محفوظة</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
